  - main [ref=e22]:
    - generic [ref=e23]:
      - article [ref=e25]:
        - heading "WSL 2 使用 Docker 桥接模式网络访问 HTTPS 超时的解决方法" [level=1] [ref=e27]
        - generic [ref=e28]:
          - figure [ref=e29]:
            - img "WSL 2 使用 Docker 桥接模式网络访问 HTTPS 超时的解决方法" [ref=e30]
          - generic [ref=e31]:
            - paragraph [ref=e32]: 本文介绍在 WSL 2 中使用 Docker 的桥接模式（bridge network）访问 HTTPS 时出现超时问题的解决方法。
            - paragraph [ref=e33]: 最近一直在 Windows 下使用基于 WSL 2 的 Debian 进行开发。许多场景下需要使用 Docker 构建镜像，但过程中遇到一个奇怪的问题，在 Docker 容器内部访问 HTTP 站点时一切正常：
            - generic [ref=e34]:
              - code [ref=e36]: $ docker run --rm curlimages/curl time curl -s http://ip.gs 192.0.2.2 real 0m 0.02s user 0m 0.00s sys 0m 0.00s
              - button "Copy" [ref=e38] [cursor=pointer]
            - paragraph [ref=e39]: 一旦切换为 HTTPS，访问就会明显变慢，并且有一定概率出现超时：
            - generic [ref=e40]:
              - code [ref=e42]: $ docker run --rm curlimages/curl time curl -s https://ip.gs 192.0.2.2 real 0m 6.52s user 0m 0.00s sys 0m 0.00s
              - button "Copy" [ref=e44] [cursor=pointer]
            - paragraph [ref=e45]:
              - text: 然而，如果将 Docker 切换到 Host 模式（
              - code [ref=e46]: "--network=host"
              - text: ），访问又恢复正常：
            - generic [ref=e47]:
              - code [ref=e49]: $ docker run --rm --network=host curlimages/curl time curl -s https://ip.gs 192.2.0.2 real 0m 0.28s user 0m 0.00s sys 0m 0.00s
              - button "Copy" [ref=e51] [cursor=pointer]
            - paragraph [ref=e52]: 在排查了 WSL 2 的 Debian 系统配置后，最终请教 ChatGPT 得到结论：
            - blockquote [ref=e53]:
              - blockquote [ref=e54]:
                - paragraph [ref=e55]: Path MTU 与防火墙流量检查（inspection）不兼容导致问题
            - paragraph [ref=e56]:
              - text: 解决方法很简单：将 WSL 2 虚拟网络的 MTU 下调为
              - code [ref=e57]: "1400"
              - text: 即可。
            - heading "Permalink1、添加 Docker 配置" [level=2] [ref=e58]:
              - link "Permalink" [ref=e59] [cursor=pointer]:
                - /url: "#1-tian-jia-docker-pei-zhi"
                - text: "#"
              - text: 1、添加 Docker 配置
            - paragraph [ref=e60]:
              - text: 在 WSL 2 的系统里，使用 root 用户修改
              - code [ref=e61]: /etc/docker/daemon.json
              - text: 文件：
            - generic [ref=e62]:
              - code [ref=e64]: "{ \"log-driver\": \"json-file\", \"log-opts\": { \"max-size\": \"20m\", \"max-file\": \"3\" }, \"mtu\": 1400, \"dns\": [ \"8.8.8.8\", \"1.1.1.1\" ] }"
              - button "Copy" [ref=e66] [cursor=pointer]
            - paragraph [ref=e67]:
              - text: 其中
              - code [ref=e68]: "\"mtu\": 1400,"
              - text: 是关键配置。
            - paragraph [ref=e69]: 然后在 Windows 下把 WSL 2 关闭：
            - generic [ref=e70]:
              - code [ref=e72]: wsl --shutdown
              - button "Copy" [ref=e74] [cursor=pointer]
            - heading "Permalink2、修改 WSL 2 网卡配置" [level=2] [ref=e75]:
              - link "Permalink" [ref=e76] [cursor=pointer]:
                - /url: "#2-xiu-gai-wsl-2-wang-qia-pei-zhi"
                - text: "#"
              - text: 2、修改 WSL 2 网卡配置
            - paragraph [ref=e77]: 在 Windows 下使用管理员身份运行 Powershell，检查网卡名称：
            - generic [ref=e78]:
              - code [ref=e80]: "PS C:\\Users\\showfom> Get-NetAdapter | Where-Object { $_.Name -like \"*WSL*\" } Name InterfaceDescription ifIndex Status MacAddress LinkSpeed ---- -------------------- ------- ------ ---------- --------- vEthernet (WSL (Hyper-V … Hyper-V Virtual Ethernet Adapter #3 41 Up 12-34-56-78-AB-CD 10 Gbps PS C:\\Users\\showfom> Get-NetAdapter | Format-Table -AutoSize Name InterfaceDescription ifIndex Status MacAddress Lin kSp eed ---- -------------------- ------- ------ ---------- --- vEthernet (Default Switch) Hyper-V Virtual Ethernet Adapter 35 Up 12-34-56-78-AB-AB …ps vEthernet (WSL (Hyper-V firewall)) Hyper-V Virtual Ethernet Adapter #3 41 Up 12-34-56-78-AB-CD …ps"
              - button "Copy" [ref=e82] [cursor=pointer]
            - paragraph [ref=e83]:
              - text: 输出可以看到完整名称为
              - code [ref=e84]: vEthernet (WSL (Hyper-V firewall))
              - text: ，然后为其设置 MTU：
            - generic [ref=e85]:
              - code [ref=e87]: netsh interface ipv4 set subinterface "vEthernet (WSL (Hyper-V firewall))" mtu=1400 store=persistent
              - button "Copy" [ref=e89] [cursor=pointer]
            - paragraph [ref=e90]:
              - text: 出现
              - code [ref=e91]: Ok.
              - text: 字样即代表设置成功。
            - heading "Permalink3、测试 WSL 2 中的 Docker 网络" [level=2] [ref=e92]:
              - link "Permalink" [ref=e93] [cursor=pointer]:
                - /url: "#3-ce-shi-wsl-2-zhong-de-docker-wang-luo"
                - text: "#"
              - text: 3、测试 WSL 2 中的 Docker 网络
            - paragraph [ref=e94]: 然后重新运行 WSL 2 虚拟机：
            - generic [ref=e95]:
              - code [ref=e97]: wsl -d debian
              - button "Copy" [ref=e99] [cursor=pointer]
            - paragraph [ref=e100]: 再次测试：
            - generic [ref=e101]:
              - code [ref=e103]: $ docker run --rm curlimages/curl time curl -s https://ip.gs 192.0.2.2 real 0m 0.28s user 0m 0.00s sys 0m 0.00s
              - button "Copy" [ref=e105] [cursor=pointer]
            - paragraph [ref=e106]:
              - text: 问题已完美解决，可以继续愉快地 Vibe Coding 了！
              - emphasis [ref=e107]: ★,°
              - text: ":.☆(￣▽￣)/$:"
              - emphasis [ref=e108]: .°★
              - text: 。
