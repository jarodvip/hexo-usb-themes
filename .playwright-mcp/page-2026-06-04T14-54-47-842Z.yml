      - article [ref=e25]:
        - heading "Debian / Ubuntu 使用源安装 LEMP 教程" [level=1] [ref=e27]
        - generic [ref=e28]:
          - figure [ref=e29]:
            - img "Debian / Ubuntu 使用源安装 LEMP 教程" [ref=e30]
          - generic [ref=e31]:
            - paragraph [ref=e32]: 本文将介绍使用官方源和第三方源在 Debian 和 Ubuntu 安装最新版 Nginx + PHP + MySQL 的教程，并且可以自行选择 PHP 版本。
            - paragraph [ref=e33]:
              - strong [ref=e34]: PS：本文适用于 Debian Stable 以及 Ubuntu LTS
            - paragraph [ref=e35]:
              - text: 以下操作需要在 root 用户下完成，请使用
              - code [ref=e36]: sudo -i
              - text: 或
              - code [ref=e37]: su root
              - text: 切换到 root 用户进行操作。
            - heading "Permalink1、更新系统并安装部分必要软件" [level=2] [ref=e38]:
              - link "Permalink" [ref=e39] [cursor=pointer]:
                - /url: "#1-geng-xin-xi-tong-bing-an-zhuang-bu-fen-bi-yao-ruan-jian"
                - text: "#"
              - text: 1、更新系统并安装部分必要软件
            - generic [ref=e40]:
              - code [ref=e42]: apt update apt upgrade -y apt install curl vim wget gnupg dpkg apt-transport-https lsb-release ca-certificates
              - button "Copy" [ref=e44] [cursor=pointer]
            - paragraph [ref=e45]:
              - strong [ref=e46]:
                - text: 如果您通过 iso 方式安装 Debian 并且设置了 root 密码，则默认不带
                - code [ref=e47]: sudo
                - text: 包，使用
                - code [ref=e48]: apt install sudo
                - text: 安装即可
            - heading "Permalink2、增加烧饼博客打包的 Nginx 源并安装" [level=2] [ref=e49]:
              - link "Permalink" [ref=e50] [cursor=pointer]:
                - /url: "#2-zeng-jia-shao-bing-bo-ke-da-bao-de-nginx-yuan-bing-an-zhuang"
                - text: "#"
              - text: 2、增加烧饼博客打包的 Nginx 源并安装
            - paragraph [ref=e51]:
              - text: 这里我们推荐
              - link "烧饼博客" [ref=e52] [cursor=pointer]:
                - /url: https://n.wtf/
              - text: 团队打包的 Nginx 源，这货是在
              - link "官方 Nginx 打包组" [ref=e53] [cursor=pointer]:
                - /url: https://salsa.debian.org/nginx-team
              - text: 的基础上，保持更新最新版本的 Nginx 以及 OpenSSL。
            - heading "Permalink2.1 首先增加 GPG Key" [level=3] [ref=e54]:
              - link "Permalink" [ref=e55] [cursor=pointer]:
                - /url: "#2-1-shou-xian-zeng-jia-gpg-key"
                - text: "#"
              - text: 2.1 首先增加 GPG Key
            - generic [ref=e56]:
              - code [ref=e58]: curl -sSL https://n.wtf/public.key | gpg --dearmor > /usr/share/keyrings/n.wtf.gpg
              - button "Copy" [ref=e60] [cursor=pointer]
            - heading "Permalink2.2 然后增加 Nginx 源" [level=3] [ref=e61]:
              - link "Permalink" [ref=e62] [cursor=pointer]:
                - /url: "#2-2-ran-hou-zeng-jia-nginx-yuan"
                - text: "#"
              - text: 2.2 然后增加 Nginx 源
            - generic [ref=e63]:
              - code [ref=e65]:
                - text: echo
                - generic [ref=e66]: "\"deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/n.wtf.gpg] https://mirror-cdn.xtom.com/sb/nginx/ $(lsb_release -sc) main\""
                - text: "> /etc/apt/sources.list.d/n.wtf.list"
              - button "Copy" [ref=e68] [cursor=pointer]
            - paragraph [ref=e69]:
              - text: 国内机器可以用
              - link "清华 TUNA" [ref=e70] [cursor=pointer]:
                - /url: https://mirrors.tuna.tsinghua.edu.cn/
              - text: 的国内源：
            - generic [ref=e71]:
              - code [ref=e73]:
                - text: echo
                - generic [ref=e74]: "\"deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/n.wtf.gpg] https://mirrors.tuna.tsinghua.edu.cn/n.wtf/ $(lsb_release -sc) main\""
                - text: "> /etc/apt/sources.list.d/n.wtf.list"
              - button "Copy" [ref=e76] [cursor=pointer]
            - paragraph [ref=e77]:
              - text: Debian 下也可以直接使用
              - link "extrepo" [ref=e78] [cursor=pointer]:
                - /url: /debian-extrepo/
              - text: ":"
            - generic [ref=e79]:
              - code [ref=e81]: sudo apt update sudo apt install extrepo -y sudo extrepo enable n.wtf
              - button "Copy" [ref=e83] [cursor=pointer]
            - heading "Permalink2.3 接着更新并安装 Nginx" [level=3] [ref=e84]:
              - link "Permalink" [ref=e85] [cursor=pointer]:
                - /url: "#2-3-jie-zhao-geng-xin-bing-an-zhuang-nginx"
                - text: "#"
              - text: 2.3 接着更新并安装 Nginx
            - generic [ref=e86]:
              - code [ref=e88]: apt update apt install nginx-extras -y
              - button "Copy" [ref=e90] [cursor=pointer]
            - paragraph [ref=e91]:
              - text: 安装完毕后，我们可以使用
              - code [ref=e92]: nginx -V
              - text: 命令看到 Nginx 已经是最新的 1.29.4 主线版了：
            - generic [ref=e93]:
              - code [ref=e95]: "root@debian ~ # nginx -V nginx version: nginx-n.wtf/1.29.4 built by gcc 14.2.0 (Debian 14.2.0-19) built with OpenSSL 3.6.0 1 Oct 2025 TLS SNI support enabled"
              - button "Copy" [ref=e97] [cursor=pointer]
            - heading "Permalink3、增加 Ondřej Surý 大神打包的 PHP 源并安装 PHP 8.x" [level=2] [ref=e98]:
              - link "Permalink" [ref=e99] [cursor=pointer]:
                - /url: "#3-zeng-jia-ondrej-sury-da-shen-da-bao-de-php-yuan-bing-an-zhuang-php-8-x"
                - text: "#"
              - text: 3、增加 Ondřej Surý 大神打包的 PHP 源并安装 PHP 8.x
            - paragraph [ref=e100]:
              - link "Ondřej Surý" [ref=e101] [cursor=pointer]:
                - /url: https://deb.sury.org/
              - text: 大佬打包的 PHP 源更好用，Ubuntu 的
              - link "PPA for PHP" [ref=e102] [cursor=pointer]:
                - /url: https://launchpad.net/~ondrej/+archive/ubuntu/php
              - text: 就是这位大佬做的，当然少不了 Debian 的源了，下面一步一步来。
            - heading "Permalink3.1 Debian 和 Ubuntu 安装 LEMP 区别" [level=3] [ref=e103]:
              - link "Permalink" [ref=e104] [cursor=pointer]:
                - /url: "#3-1-debian-he-ubuntu-an-zhuang-lemp-qu-bie"
                - text: "#"
              - text: 3.1 Debian 和 Ubuntu 安装 LEMP 区别
            - paragraph [ref=e105]: 唯一区别就是 PHP 的安装添加源方法不一样，其他的步骤都一毛一样。
            - heading "Permalink3.2 加入大神做好的源" [level=3] [ref=e106]:
              - link "Permalink" [ref=e107] [cursor=pointer]:
                - /url: "#3-2-jia-ru-da-shen-zuo-hao-de-yuan"
                - text: "#"
              - text: 3.2 加入大神做好的源
            - generic [ref=e108]:
              - generic [ref=e109]:
                - button "Debian" [ref=e110] [cursor=pointer]
                - button "Ubuntu" [ref=e111] [cursor=pointer]
              - generic [ref=e114]:
                - code [ref=e116]:
                  - text: wget -O /usr/share/keyrings/php.gpg https://packages.sury.org/php/apt.gpg echo
                  - generic [ref=e117]: "\"deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/php.gpg] https://packages.sury.org/php/ $(lsb_release -sc) main\""
                  - text: "> /etc/apt/sources.list.d/php.list"
                - button "Copy" [ref=e119] [cursor=pointer]
            - paragraph [ref=e120]: 这个大神的 GPG 密钥每两年会更新一个新的，如果 GPG 密钥失效，重新下载 GPG 密钥即可。
            - paragraph [ref=e121]:
              - text: Debian 下也可以直接使用
              - link "extrepo" [ref=e122] [cursor=pointer]:
                - /url: /debian-extrepo/
              - text: ":"
            - generic [ref=e123]:
              - code [ref=e125]: sudo extrepo enable sury
              - button "Copy" [ref=e127] [cursor=pointer]
            - paragraph [ref=e128]:
              - text: 国内机器可以用
              - link "南京大学" [ref=e129] [cursor=pointer]:
                - /url: https://mirror.nju.edu.cn/
              - text: 的国内源：
            - generic [ref=e130]:
              - code [ref=e132]:
                - text: wget -O /usr/share/keyrings/php.gpg https://mirror.nju.edu.cn/sury/php/apt.gpg echo
                - generic [ref=e133]: "\"deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/php.gpg] https://mirror.nju.edu.cn/sury/php/ $(lsb_release -sc) main\""
                - text: "> /etc/apt/sources.list.d/php.list"
              - button "Copy" [ref=e135] [cursor=pointer]
            - paragraph [ref=e136]: Ubuntu 的 PPA 暂时没有国内镜像，可以使用 USTC 反代的方式：
            - generic [ref=e137]:
              - code [ref=e139]:
                - text: curl "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x14aa40ec0831756756d7f66c4f4ea0aae5267a6c" | gpg --dearmor > /usr/share/keyrings/php.gpg echo
                - generic [ref=e140]: "\"deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/php.gpg] https://launchpad.proxy.ustclug.org/ondrej/php/ubuntu $(lsb_release -sc) main\""
                - text: "> /etc/apt/sources.list.d/php.list"
              - button "Copy" [ref=e142] [cursor=pointer]
            - paragraph [ref=e143]:
              - text: 如果 GPG 密钥失效，请
              - link "查看最新的 GPG 密钥" [ref=e144] [cursor=pointer]:
                - /url: https://launchpad.net/~ondrej/+archive/ubuntu/php/
              - text: 。
            - heading "Permalink3.3 更新系统" [level=3] [ref=e145]:
              - link "Permalink" [ref=e146] [cursor=pointer]:
                - /url: "#3-3-geng-xin-xi-tong"
                - text: "#"
              - text: 3.3 更新系统
            - generic [ref=e147]:
              - code [ref=e149]: apt update apt upgrade -y
              - button "Copy" [ref=e151] [cursor=pointer]
            - heading "Permalink3.4 安装自己需要的 PHP 版本" [level=3] [ref=e152]:
              - link "Permalink" [ref=e153] [cursor=pointer]:
                - /url: "#3-4-an-zhuang-zi-ji-xu-yao-de-php-ban-ben"
                - text: "#"
              - text: 3.4 安装自己需要的 PHP 版本
            - paragraph [ref=e154]: 这个源目前默认的 PHP 是 8.5.x，如果您需要其他版本，那么请修改对应的 PHP 版本号 (注意配置文件哦)。
            - paragraph [ref=e155]: 这里举例 WordPress 需要的部分 PHP 包：
            - paragraph [ref=e156]: "安装 PHP 8.5.x (从 PHP 8.5 开始 OPcache 已经强制集成，不需要单独安装):"
            - generic [ref=e157]:
              - code [ref=e159]: "apt install php8.5-{fpm,cli,mysql,curl,gd,mbstring,xml,zip,imap,soap,gmp,bcmath} -y"
              - button "Copy" [ref=e161] [cursor=pointer]
            - paragraph [ref=e162]: 安装 PHP 8.4.x：
            - generic [ref=e163]:
              - code [ref=e165]: "apt install php8.4-{fpm,cli,mysql,curl,gd,mbstring,xml,zip,imap,opcache,soap,gmp,bcmath} -y"
              - button "Copy" [ref=e167] [cursor=pointer]
            - paragraph [ref=e168]: 安装 PHP 8.3.x：
            - generic [ref=e169]:
              - code [ref=e171]: "apt install php8.3-{fpm,cli,mysql,curl,gd,mbstring,xml,zip,imap,opcache,soap,gmp,bcmath} -y"
              - button "Copy" [ref=e173] [cursor=pointer]
            - paragraph [ref=e174]: 安装 PHP 8.2.x：
            - generic [ref=e175]:
              - code [ref=e177]: apt install php8.2-fpm php8.2-cli php8.2-mysql php8.2-curl php8.2-gd php8.2-mbstring php8.2-xml php8.2-zip php8.2-imap php8.2-opcache php8.2-soap php8.2-gmp php8.2-bcmath -y
              - button "Copy" [ref=e179] [cursor=pointer]
            - paragraph [ref=e180]:
              - strong [ref=e181]: 以下版本 PHP 已经 EOL，PHP 官方不再提供支持，请尽快更新您的程序兼容最新的 PHP，如果您的程序还未兼容，建议鞭策开发者
            - paragraph [ref=e182]: 安装 PHP 8.1.x：
            - generic [ref=e183]:
              - code [ref=e185]: apt install php8.1-fpm php8.1-cli php8.1-mysql php8.1-curl php8.1-gd php8.1-mbstring php8.1-xml php8.1-zip php8.1-imap php8.1-opcache php8.1-soap php8.1-gmp php8.1-bcmath -y
              - button "Copy" [ref=e187] [cursor=pointer]
            - paragraph [ref=e188]: 安装 PHP 8.0.x：
            - generic [ref=e189]:
              - code [ref=e191]: apt install php8.0-fpm php8.0-cli php8.0-mysql php8.0-curl php8.0-gd php8.0-mbstring php8.0-xml php8.0-zip php8.0-imap php8.0-opcache php8.0-soap php8.0-gmp php8.0-bcmath -y
              - button "Copy" [ref=e193] [cursor=pointer]
            - paragraph [ref=e194]: 安装 PHP 7.4.x：
            - generic [ref=e195]:
              - code [ref=e197]: apt install php7.4-fpm php7.4-cli php7.4-mysql php7.4-curl php7.4-gd php7.4-mbstring php7.4-xml php7.4-xmlrpc php7.4-zip php7.4-json php7.4-imap php7.4-opcache php7.4-soap php7.4-gmp php7.4-bcmath -y
              - button "Copy" [ref=e199] [cursor=pointer]
            - paragraph [ref=e200]: 安装 PHP 7.3.x：
            - generic [ref=e201]:
              - code [ref=e203]: apt install php7.3-fpm php7.3-mysql php7.3-curl php7.3-gd php7.3-mbstring php7.3-xml php7.3-xmlrpc php7.3-zip php7.3-opcache
              - button "Copy" [ref=e205] [cursor=pointer]
            - paragraph [ref=e206]: 安装 PHP 7.2.x (PHP 7.2 开始已经不支持 mcrypt 组件)：
            - generic [ref=e207]:
              - code [ref=e209]: apt install php7.2-fpm php7.2-mysql php7.2-curl php7.2-gd php7.2-mbstring php7.2-xml php7.2-xmlrpc php7.2-zip php7.2-opcache
              - button "Copy" [ref=e211] [cursor=pointer]
            - paragraph [ref=e212]: 安装 PHP 7.1.x：
            - generic [ref=e213]:
              - code [ref=e215]: apt install php7.1-fpm php7.1-mysql php7.1-curl php7.1-gd php7.1-mbstring php7.1-mcrypt php7.1-xml php7.1-xmlrpc php7.1-zip php7.1-opcache
              - button "Copy" [ref=e217] [cursor=pointer]
            - paragraph [ref=e218]: 安装 PHP 7.0.x：
            - generic [ref=e219]:
              - code [ref=e221]: apt install php7.0-fpm php7.0-mysql php7.0-curl php7.0-gd php7.0-mbstring php7.0-mcrypt php7.0-xml php7.0-xmlrpc php7.0-zip php7.0-opcache
              - button "Copy" [ref=e223] [cursor=pointer]
            - paragraph [ref=e224]: 安装 PHP 5.6.x：
            - generic [ref=e225]:
              - code [ref=e227]: apt install php5.6-fpm php5.6-mysql php5.6-curl php5.6-gd php5.6-mbstring php5.6-mcrypt php5.6-xml php5.6-xmlrpc php5.6-zip php5.6-opcache
              - button "Copy" [ref=e229] [cursor=pointer]
            - paragraph [ref=e230]: 如果希望安装其他组件，可以通过搜索看看有没有对应的包：
            - generic [ref=e231]:
              - code [ref=e233]: apt-cache search php8.5* | grep php8.5
              - button "Copy" [ref=e235] [cursor=pointer]
            - paragraph [ref=e236]:
              - text: 修改
              - code [ref=e237]: php.ini
              - text: 防止跨目录攻击，如果安装的 PHP 8.5.x 请修改
              - code [ref=e238]: /etc/php/8.5/fpm/php.ini
              - text: PHP 7.4.x 请对应修改
              - code [ref=e239]: /etc/php/7.4/fpm/php.ini
              - text: ：
            - generic [ref=e240]:
              - code [ref=e242]: sed -i 's/;cgi.fix_pathinfo=1/cgi.fix_pathinfo=0/' /etc/php/8.5/fpm/php.ini
              - button "Copy" [ref=e244] [cursor=pointer]
            - paragraph [ref=e245]:
              - text: 修改
              - code [ref=e246]: php.ini
              - text: 增加上传大小限制，比如我们设置 10MB：
            - generic [ref=e247]:
              - code [ref=e249]: sed -i 's/upload_max_filesize = 2M/upload_max_filesize = 10M/' /etc/php/8.5/fpm/php.ini sed -i 's/post_max_size = 8M/post_max_size = 10M/' /etc/php/8.5/fpm/php.ini
              - button "Copy" [ref=e251] [cursor=pointer]
            - paragraph [ref=e252]: 您也可以同时安装多个 PHP 版本，然后使用以下命令选择系统默认的 PHP 版本：
            - generic [ref=e253]:
              - code [ref=e255]: update-alternatives --config php
              - button "Copy" [ref=e257] [cursor=pointer]
            - heading "Permalink3.5 重启 PHP 和 Nginx" [level=3] [ref=e258]:
              - link "Permalink" [ref=e259] [cursor=pointer]:
                - /url: "#3-5-chong-qi-php-he-nginx"
                - text: "#"
              - text: 3.5 重启 PHP 和 Nginx
            - generic [ref=e260]:
              - code [ref=e262]: systemctl restart php8.5-fpm
              - button "Copy" [ref=e264] [cursor=pointer]
            - paragraph [ref=e265]: 对应 PHP 7.4.x 命令如下：
            - generic [ref=e266]:
              - code [ref=e268]: systemctl restart php7.4-fpm
              - button "Copy" [ref=e270] [cursor=pointer]
            - paragraph [ref=e271]:
              - text: Nginx 参考配置文件如下，新建立个
              - code [ref=e272]: /etc/nginx/sites-available/example.com.conf
              - text: ：
            - generic [ref=e273]:
              - code [ref=e275]: "cat >> /etc/nginx/sites-available/example.com.conf << EOF server { listen 80; listen [::]:80; # 指定网站目录，可根据自己情况更换，建议放在 /var/www 目录下 root /var/www/example.com; index index.php index.html index.htm; # 默认第一个域名，替换 example.com 为您的域名 server_name example.com; location / { try_files \\$uri \\$uri/ =404; } # 开启 PHP8.5-fpm 模式，如需要安装 PHP 7.4.x 请修改为 fastcgi_pass unix:/run/php/php7.4-fpm.sock; location ~ \\.php$ { include snippets/fastcgi-php.conf; fastcgi_pass unix:/run/php/php8.5-fpm.sock; } } EOF"
              - button "Copy" [ref=e277] [cursor=pointer]
            - paragraph [ref=e278]:
              - text: 然后把这个配置文件软链接到
              - code [ref=e279]: /etc/nginx/sites-enabled
              - text: 目录使其生效：
            - generic [ref=e280]:
              - code [ref=e282]: ln -s /etc/nginx/sites-available/example.com.conf /etc/nginx/sites-enabled/example.com.conf
              - button "Copy" [ref=e284] [cursor=pointer]
            - paragraph [ref=e285]: 到这里基本没有问题，可以直接重新加载 Nginx：
            - generic [ref=e286]:
              - code [ref=e288]: nginx -t nginx -s reload
              - button "Copy" [ref=e290] [cursor=pointer]
            - paragraph [ref=e291]: 或者暴力点直接重启 Nginx：
            - generic [ref=e292]:
              - code [ref=e294]: systemctl restart nginx
              - button "Copy" [ref=e296] [cursor=pointer]
            - paragraph [ref=e297]:
              - text: 我们的目录在
              - code [ref=e298]: /var/www/example.com
              - text: ，我们先创建这个目录：
            - generic [ref=e299]:
              - code [ref=e301]: mkdir -p /var/www/example.com
              - button "Copy" [ref=e303] [cursor=pointer]
            - paragraph [ref=e304]:
              - text: 然后创建一个
              - code [ref=e305]: phpinfo.php
              - text: 并输入
              - code [ref=e306]: phpinfo()
              - text: 函数：
            - generic [ref=e307]:
              - code [ref=e309]: cat >> /var/www/example.com/phpinfo.php << EOF <?php phpinfo(); ?> EOF
              - button "Copy" [ref=e311] [cursor=pointer]
            - paragraph [ref=e312]:
              - text: 好了，此时在浏览器输入
              - code [ref=e313]: http://example.com/phpinfo.php
              - text: ，如果看到经典的
              - code [ref=e314]: phpinfo
              - text: 页面则说明安装成功，如果不成功，请仔细对比步骤查找哪里出错。
            - paragraph [ref=e315]: 效果如下：
            - paragraph:
              - img "Debian Install LEMP PHPINFO"
            - heading "Permalink4、安装 MariaDB" [level=2] [ref=e316]:
              - link "Permalink" [ref=e317] [cursor=pointer]:
                - /url: "#4-an-zhuang-mariadb"
                - text: "#"
              - text: 4、安装 MariaDB
            - paragraph [ref=e318]:
              - text: 自从 Debian 9.x Stretch 开始，Debian
              - link "已经默认使用" [ref=e319] [cursor=pointer]:
                - /url: https://mariadb.com/resources/blog/mariadb-server-default-debian-9
              - text: Mariadb，所以我们不做对于 MySQL 和 MariaDB 的争论，直接跟着开源社区走即可。
            - heading "Permalink4.1 首先，添加并导入 Mariadb 的官方源" [level=3] [ref=e320]:
              - link "Permalink" [ref=e321] [cursor=pointer]:
                - /url: "#4-1-shou-xian-tian-jia-bing-dao-ru-mariadb-de-guan-fang-yuan"
                - text: "#"
              - text: 4.1 首先，添加并导入 Mariadb 的官方源
            - paragraph [ref=e322]: 下载 GPG Key：
            - generic [ref=e323]:
              - code [ref=e325]: curl -sSL https://supplychain.mariadb.com/MariaDB-Server-GPG-KEY | gpg --dearmor > /usr/share/keyrings/mariadb.gpg
              - button "Copy" [ref=e327] [cursor=pointer]
            - paragraph [ref=e328]: 然后添加 MariaDB 的源：
            - generic [ref=e329]:
              - generic [ref=e330]:
                - button "Debian" [ref=e331] [cursor=pointer]
                - button "Ubuntu" [ref=e332] [cursor=pointer]
              - generic [ref=e335]:
                - code [ref=e337]:
                  - text: echo
                  - generic [ref=e338]: "\"deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/mariadb.gpg] https://dlm.mariadb.com/repo/mariadb-server/11.8/repo/debian $(lsb_release -sc) main\""
                  - text: "> /etc/apt/sources.list.d/mariadb.list"
                - button "Copy" [ref=e340] [cursor=pointer]
            - paragraph [ref=e341]:
              - text: Debian 下也可以直接使用
              - link "extrepo" [ref=e342] [cursor=pointer]:
                - /url: /debian-extrepo/
              - text: ":"
            - generic [ref=e343]:
              - code [ref=e345]: sudo extrepo enable mariadb-11.8
              - button "Copy" [ref=e347] [cursor=pointer]
            - paragraph [ref=e348]: 国内可以用清华 TUNA 的源：
            - generic [ref=e349]:
              - generic [ref=e350]:
                - button "Debian" [ref=e351] [cursor=pointer]
                - button "Ubuntu" [ref=e352] [cursor=pointer]
              - generic [ref=e355]:
                - code [ref=e357]:
                  - text: echo
                  - generic [ref=e358]: "\"deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/mariadb.gpg] https://mirrors.tuna.tsinghua.edu.cn/mariadb/repo/11.8/debian $(lsb_release -sc) main\""
                  - text: "> /etc/apt/sources.list.d/mariadb.list"
                - button "Copy" [ref=e360] [cursor=pointer]
            - paragraph [ref=e361]:
              - text: 您也可以
              - link "在这儿" [ref=e362] [cursor=pointer]:
                - /url: https://mariadb.com/kb/en/mirror-sites-for-mariadb/
              - text: 找到更多的 MariaDB 源。
            - heading "Permalink4.2 接着更新一下系统" [level=3] [ref=e363]:
              - link "Permalink" [ref=e364] [cursor=pointer]:
                - /url: "#4-2-jie-zhao-geng-xin-yi-xia-xi-tong"
                - text: "#"
              - text: 4.2 接着更新一下系统
            - generic [ref=e365]:
              - code [ref=e367]: apt update
              - button "Copy" [ref=e369] [cursor=pointer]
            - heading "Permalink4.3 然后直接安装最新稳定版 MariaDB" [level=3] [ref=e370]:
              - link "Permalink" [ref=e371] [cursor=pointer]:
                - /url: "#4-3-ran-hou-zhi-jie-an-zhuang-zui-xin-wen-ding-ban-mariadb"
                - text: "#"
              - text: 4.3 然后直接安装最新稳定版 MariaDB
            - generic [ref=e372]:
              - code [ref=e374]: apt install mariadb-server mariadb-client
              - button "Copy" [ref=e376] [cursor=pointer]
            - paragraph [ref=e377]:
              - text: 安装完毕后强烈推荐使用
              - code [ref=e378]: mariadb-secure-installation
              - text: 命令做一次安全设置。
            - heading "Permalink4.4 创建数据库并测试" [level=3] [ref=e379]:
              - link "Permalink" [ref=e380] [cursor=pointer]:
                - /url: "#4-4-chuang-jian-shu-ju-ku-bing-ce-shi"
                - text: "#"
              - text: 4.4 创建数据库并测试
            - paragraph [ref=e381]:
              - emphasis [ref=e382]:
                - text: 开启数据库之前，您可以使用
                - code [ref=e383]: pwgen
                - text: 这个小工具或者
                - link "随机密码生成器" [ref=e384] [cursor=pointer]:
                  - /url: https://free.tools/tools/random-password-generator/
                - text: 生成一个强大的随机密码，比如 32 位，然后随意挑选一个使用
            - generic [ref=e385]:
              - code [ref=e387]: apt install pwgen pwgen 32
              - button "Copy" [ref=e389] [cursor=pointer]
            - paragraph [ref=e390]: 使用 Mariadb root 用户登陆，因为默认使用 Unix domain socket 模式，所以本机不需要 MySQL root 密码即可登录：
            - generic [ref=e391]:
              - code [ref=e393]: mariadb -u root
              - button "Copy" [ref=e395] [cursor=pointer]
            - paragraph [ref=e396]:
              - text: 创建数据库
              - code [ref=e397]: example_database
              - text: ：
            - generic [ref=e398]:
              - code [ref=e400]: CREATE DATABASE example_database DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
              - button "Copy" [ref=e402] [cursor=pointer]
            - paragraph [ref=e403]:
              - text: 创建用户名
              - code [ref=e404]: example_user
              - text: 并赋予权限：
            - generic [ref=e405]:
              - code [ref=e407]: GRANT ALL ON example_database.* TO 'example_user'@'localhost' IDENTIFIED BY '这里改成您要设置的强大的没人能猜出来的随机的密码';
              - button "Copy" [ref=e409] [cursor=pointer]
            - paragraph [ref=e410]: 刷新 MySQL 权限：
            - generic [ref=e411]:
              - code [ref=e413]: FLUSH PRIVILEGES;
              - button "Copy" [ref=e415] [cursor=pointer]
            - paragraph [ref=e416]: 没问题以后就可以退出了：
            - generic [ref=e417]:
              - code [ref=e419]: EXIT;
              - button "Copy" [ref=e421] [cursor=pointer]
            - paragraph [ref=e422]:
              - text: 新建立一个
              - code [ref=e423]: /var/www/example.com/mysql-test.php
              - text: 文件并测试：
            - generic [ref=e424]:
              - code [ref=e426]: "cat >> /var/www/example.com/mysql-test.php << EOF <?php \\$dbname = 'example_database'; //MySQL 数据库名 \\$dbuser = 'example_user'; //MySQL 用户名 \\$dbpass = '您的强大的没人可以猜出来的密码'; \\$dbhost = 'localhost'; //安装在本地就用 localhost \\$link = mysqli_connect(\\$dbhost, \\$dbuser, \\$dbpass) or die(\"Unable to Connect to '\\$dbhost'\"); mysqli_select_db(\\$link, \\$dbname) or die(\"Could not open the db '\\$dbname'\"); \\$test_query = \"SHOW TABLES FROM \\$dbname\"; \\$result = mysqli_query(\\$link, \\$test_query); \\$tblCnt = 0; while(\\$tbl = mysqli_fetch_array(\\$result)) { \\$tblCnt++; #echo \\$tbl[0].\"&lt;br /&gt;\\n\"; } if (!\\$tblCnt) { echo \"MySQL is working fine. There are no tables.\"; } else { echo \"MySQL is working fine. There are \\$tblCnt tables.\"; } ?> EOF"
              - button "Copy" [ref=e428] [cursor=pointer]
            - paragraph [ref=e429]:
              - text: 创建完毕后访问
              - code [ref=e430]: http://example.com/mysql-test.php
              - text: 如果出现
              - code [ref=e431]: MySQL is working fine. There are no tables.
              - text: 则说明 MariaDB 工作正常。
            - heading "Permalink5、安装 MySQL (可选)" [level=2] [ref=e432]:
              - link "Permalink" [ref=e433] [cursor=pointer]:
                - /url: "#5-an-zhuang-mysql-ke-xuan"
                - text: "#"
              - text: 5、安装 MySQL (可选)
            - paragraph [ref=e434]:
              - text: 如果您必须使用某些 MySQL 才有的功能，那么可以按照 MySQL
              - link "官网的教程" [ref=e435] [cursor=pointer]:
                - /url: https://dev.mysql.com/doc/mysql-apt-repo-quick-guide/en/#apt-repo-fresh-install
              - text: 安装 MySQL。
            - paragraph [ref=e436]:
              - emphasis [ref=e437]: 注意：除非您知道您在做什么，否则不要同时安装 MySQL 和 MariaDB。
            - heading "Permalink5.1 添加 apt 源" [level=3] [ref=e438]:
              - link "Permalink" [ref=e439] [cursor=pointer]:
                - /url: "#5-1-tian-jia-apt-yuan"
                - text: "#"
              - text: 5.1 添加 apt 源
            - generic [ref=e440]:
              - code [ref=e442]: wget https://repo.mysql.com/mysql-apt-config_0.8.34-1_all.deb dpkg -i mysql-apt-config_0.8.34-1_all.deb
              - button "Copy" [ref=e444] [cursor=pointer]
            - paragraph [ref=e445]:
              - text: 国内的机器可以在添加完成后修改为清华 TUNA 源，您可以修改
              - code [ref=e446]: /etc/apt/sources.list.d/mysql-community.list
              - text: 文件，替换成如下内容：
            - generic [ref=e447]:
              - code [ref=e449]: deb https://mirrors.tuna.tsinghua.edu.cn/mysql/apt/debian $(lsb_release -sc) mysql-8.0 mysql-8.4-lts mysql-apt-config mysql-tools
              - button "Copy" [ref=e451] [cursor=pointer]
            - paragraph [ref=e452]:
              - text: Debian 下也可以直接使用
              - link "extrepo" [ref=e453] [cursor=pointer]:
                - /url: /debian-extrepo/
              - text: ":"
            - generic [ref=e454]:
              - code [ref=e456]: sudo extrepo enable mysql-lts
              - button "Copy" [ref=e458] [cursor=pointer]
            - heading "Permalink5.2 安装 MySQL" [level=3] [ref=e459]:
              - link "Permalink" [ref=e460] [cursor=pointer]:
                - /url: "#5-2-an-zhuang-mysql"
                - text: "#"
              - text: 5.2 安装 MySQL
            - generic [ref=e461]:
              - code [ref=e463]: apt update apt install mysql-server -y
              - button "Copy" [ref=e465] [cursor=pointer]
            - paragraph [ref=e466]: 默认 MySQL 会安装最新的 8.4 版本，如果您需要更低的版本，比如 8.0，可以使用如下命令：
            - generic [ref=e467]:
              - code [ref=e469]: dpkg-reconfigure mysql-apt-config
              - button "Copy" [ref=e471] [cursor=pointer]
            - paragraph [ref=e472]:
              - text: 您可能需要设置一个强大的 root 密码，接下来的步骤和 MariaDB 基本相同，把
              - code [ref=e473]: mariadb
              - text: 命令换成
              - code [ref=e474]: mysql
              - text: 命令即可，本文不再赘述。
            - paragraph [ref=e475]: 好了，以上就是基本的 Debian 和 Ubuntu 安装最新版 LEMP 的教程，如有问题可以随时发评论留言讨论。
