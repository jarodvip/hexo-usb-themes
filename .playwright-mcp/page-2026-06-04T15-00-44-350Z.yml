  - main [ref=e22]:
    - generic [ref=e23]:
      - article [ref=e25]:
        - heading "Ubuntu 24.04 Noble 升级 Ubuntu 26.04 Resolute" [level=1] [ref=e27]
        - generic [ref=e28]:
          - figure [ref=e29]:
            - img "Ubuntu 24.04 Noble 升级 Ubuntu 26.04 Resolute" [ref=e30]
          - generic [ref=e31]:
            - paragraph [ref=e32]: 本文将指导如何升级 Ubuntu 24.04 Noble Numbat 到 Ubuntu 26.04 Resolute Raccoon。
            - paragraph [ref=e33]:
              - text: 相关教程：
              - link "Ubuntu 22.04 Jammy 升级 Ubuntu 24.04 Noble" [ref=e34] [cursor=pointer]:
                - /url: /ubuntu-upgrade-2404/
              - text: 。
            - heading "Permalink准备工作" [level=2] [ref=e35]:
              - link "Permalink" [ref=e36] [cursor=pointer]:
                - /url: "#zhun-bei-gong-zuo"
                - text: "#"
              - text: 准备工作
            - paragraph [ref=e37]: 除非你是物理服务器，以及没有用过奇奇怪怪定制或修改的内核的 KVM 构架的 VPS 和云主机，否则升级大版本更新内核是有一定机率导致 Grub 加载失败的，切记备份重要数据！
            - paragraph [ref=e38]:
              - emphasis [ref=e39]: OpenVZ 和 LXC 构架的 VPS 是无法升级的，因为他们没有自己独立的内核
            - paragraph [ref=e40]: 再强调一遍，一定要备份重要数据！
            - paragraph [ref=e41]:
              - text: Ubuntu 26.04 LTS 已经正式发布，不过 Ubuntu LTS 版本的自动升级提示通常会等到第一个小版本发布后才会开放。如果你在 Ubuntu 26.04.1 LTS 发布前从 Ubuntu 24.04 LTS 升级，
              - code [ref=e42]: do-release-upgrade
              - text: 需要加上
              - code [ref=e43]: "-d"
              - text: 参数。
            - paragraph [ref=e44]:
              - text: 以下操作需要在 root 用户下完成，请使用
              - code [ref=e45]: sudo -i
              - text: 或
              - code [ref=e46]: su root
              - text: 切换到 root 用户进行操作
            - heading "Permalink更新系统" [level=2] [ref=e47]:
              - link "Permalink" [ref=e48] [cursor=pointer]:
                - /url: "#geng-xin-xi-tong"
                - text: "#"
              - text: 更新系统
            - paragraph [ref=e49]: 首先需要更新你当前的系统
            - generic [ref=e50]:
              - code [ref=e52]: apt update apt upgrade -y apt dist-upgrade -y apt autoclean apt autoremove -y
              - button "Copy" [ref=e54] [cursor=pointer]
            - paragraph [ref=e55]: 如果内核更新了，可以重启让最新的内核生效，也可以直接进行升级。
            - heading "Permalink升级系统" [level=2] [ref=e56]:
              - link "Permalink" [ref=e57] [cursor=pointer]:
                - /url: "#sheng-ji-xi-tong"
                - text: "#"
              - text: 升级系统
            - paragraph [ref=e58]:
              - text: 这里有两种升级系统的方法，第一种是使用
              - code [ref=e59]: do-release-upgrade
              - text: 命令，第二种是手动更新
              - code [ref=e60]: apt
              - text: 源文件。
            - heading "Permalink方法一：使用 do-release-upgrade 命令" [level=3] [ref=e61]:
              - link "Permalink" [ref=e62] [cursor=pointer]:
                - /url: "#fang-fa-yi-shi-yong-do-release-upgrade-ming-ling"
                - text: "#"
              - text: 方法一：使用
              - code [ref=e63]: do-release-upgrade
              - text: 命令
            - paragraph [ref=e64]:
              - text: 首先需要安装
              - code [ref=e65]: ubuntu-release-upgrader-core
              - text: 包：
            - generic [ref=e66]:
              - code [ref=e68]: apt install ubuntu-release-upgrader-core
              - button "Copy" [ref=e70] [cursor=pointer]
            - paragraph [ref=e71]:
              - text: 然后修改
              - code [ref=e72]: /etc/update-manager/release-upgrades
              - text: 文件，确保
              - code [ref=e73]: Prompt
              - text: 值为
              - code [ref=e74]: lts
              - text: ：
            - generic [ref=e75]:
              - code [ref=e77]: cat /etc/update-manager/release-upgrades | grep lts
              - button "Copy" [ref=e79] [cursor=pointer]
            - paragraph [ref=e80]: 显示如下内容即可：
            - generic [ref=e81]:
              - code [ref=e83]: "root@ubuntu ~ # cat /etc/update-manager/release-upgrades | grep lts # lts - Check to see if a new LTS release is available. The upgrader Prompt=lts"
              - button "Copy" [ref=e85] [cursor=pointer]
            - paragraph [ref=e86]: 最后执行以下命令升级系统：
            - generic [ref=e87]:
              - code [ref=e89]: do-release-upgrade -d
              - button "Copy" [ref=e91] [cursor=pointer]
            - paragraph [ref=e92]: 等 Ubuntu 26.04.1 LTS 发布并开放 LTS 自动升级后，可以直接使用：
            - generic [ref=e93]:
              - code [ref=e95]: do-release-upgrade
              - button "Copy" [ref=e97] [cursor=pointer]
            - heading "Permalink方法二：手动更新 apt 源文件" [level=3] [ref=e98]:
              - link "Permalink" [ref=e99] [cursor=pointer]:
                - /url: "#fang-fa-er-shou-dong-geng-xin-apt-yuan-wen-jian"
                - text: "#"
              - text: 方法二：手动更新
              - code [ref=e100]: apt
              - text: 源文件
            - paragraph [ref=e101]:
              - text: Ubuntu 24.04 的默认软件源配置文件已经变更为
              - code [ref=e102]: DEB822
              - text: 格式，路径为
              - code [ref=e103]: /etc/apt/sources.list.d/ubuntu.sources
              - text: 。我们可以直接替换
              - code [ref=e104]: noble
              - text: 为
              - code [ref=e105]: resolute
              - text: ：
            - generic [ref=e106]:
              - code [ref=e108]: sed -i 's/noble/resolute/g' /etc/apt/sources.list.d/ubuntu.sources
              - button "Copy" [ref=e110] [cursor=pointer]
            - paragraph [ref=e111]: 如果你的系统里仍然有传统 One-Line-Style 的源文件，也可以一并替换：
            - generic [ref=e112]:
              - code [ref=e114]: sed -i 's/noble/resolute/g' /etc/apt/sources.list sed -i 's/noble/resolute/g' /etc/apt/sources.list.d/*.list
              - button "Copy" [ref=e116] [cursor=pointer]
            - paragraph [ref=e117]:
              - text: 如果没有对应文件会提示诸如
              - code [ref=e118]: "sed: can't read /etc/apt/sources.list: No such file or directory"
              - text: 的错误，忽略即可。
            - paragraph [ref=e119]: 或者直接一行命令：
            - generic [ref=e120]:
              - code [ref=e122]: "sed -i 's/noble/resolute/g' /etc/apt/sources.list /etc/apt/sources.list.d/*.{list,sources} 2>/dev/null"
              - button "Copy" [ref=e124] [cursor=pointer]
            - paragraph [ref=e125]:
              - text: 使用
              - code [ref=e126]: DEB822
              - text: 格式的源文件
              - code [ref=e127]: /etc/apt/sources.list.d/ubuntu.sources
              - text: 应该是类似这样的：
            - generic [ref=e128]:
              - code [ref=e130]: "Types: deb URIs: https://archive.ubuntu.com/ubuntu Suites: resolute resolute-updates resolute-backports Components: main restricted universe multiverse Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg Types: deb URIs: http://security.ubuntu.com/ubuntu Suites: resolute-security Components: main restricted universe multiverse Signed-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg"
              - button "Copy" [ref=e132] [cursor=pointer]
            - paragraph [ref=e133]:
              - emphasis [ref=e134]:
                - text: 国内服务器可以替换
                - code [ref=e135]: archive.ubuntu.com
                - text: 和
                - code [ref=e136]: security.ubuntu.com
                - text: 为
                - code [ref=e137]: mirrors.tuna.tsinghua.edu.cn
            - paragraph [ref=e138]: 如果你有第三方源或 PPA，建议先备份并根据情况临时禁用，升级完成后再确认是否支持 Ubuntu 26.04：
            - generic [ref=e139]:
              - code [ref=e141]: mkdir -p /root/apt-sources-backup cp -a /etc/apt/sources.list.d /root/apt-sources-backup/
              - button "Copy" [ref=e143] [cursor=pointer]
            - paragraph [ref=e144]:
              - text: 第三方源通常需要单独检查，不能简单把
              - code [ref=e145]: noble
              - text: 替换成
              - code [ref=e146]: resolute
              - text: 。
            - paragraph [ref=e147]: 然后我们再次执行更新系统：
            - generic [ref=e148]:
              - code [ref=e150]: apt update apt upgrade -y apt full-upgrade -y
              - button "Copy" [ref=e152] [cursor=pointer]
            - paragraph [ref=e153]:
              - emphasis [ref=e154]: 更新过程中会提示一些软件是否需要自动重启，选 Yes 即可，以及一些软件的配置文件是否需要更新，按照自己的情况选择即可，默认回车即视为使用旧的配置文件，一般会出现在 OpenSSH 等软件的更新上。
            - paragraph [ref=e155]: 更新后删除不必要的软件和依赖：
            - generic [ref=e156]:
              - code [ref=e158]: apt autoclean apt autoremove -y
              - button "Copy" [ref=e160] [cursor=pointer]
            - paragraph [ref=e161]:
              - text: 然后我们使用
              - code [ref=e162]: reboot
              - text: 命令重启系统，耐心等待后，查看最新的系统版本：
            - generic [ref=e163]:
              - code [ref=e165]: "root@ubuntu ~ # lsb_release -a No LSB modules are available. Distributor ID: Ubuntu Description: Ubuntu 26.04 LTS Release: 26.04 Codename: resolute"
              - button "Copy" [ref=e167] [cursor=pointer]
            - generic [ref=e168]:
              - code [ref=e170]: "root@ubuntu ~ # uname -a Linux Nana 7.0.0-15-generic #15-Ubuntu SMP PREEMPT_DYNAMIC Wed Apr 22 16:06:43 UTC 2026 x86_64 GNU/Linux"
              - button "Copy" [ref=e172] [cursor=pointer]
            - paragraph [ref=e173]: 这时我们就已经更新到了最新的 Ubuntu 26.04 Resolute 和内核了。
