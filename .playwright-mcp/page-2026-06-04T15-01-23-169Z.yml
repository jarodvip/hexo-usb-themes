                - text: 如果您通过 iso 方式安装 Debian 并且设置了 root 密码，则默认不带
                - code [ref=e47]: sudo
                - text: 包，使用
                - code [ref=e48]: apt install sudo
                - text: 安装即可
            - heading "Permalink2、增加 Ondřej Surý 大神打包的 PHP 源并安装 PHP 8.x" [level=2] [ref=e49]:
              - link "Permalink" [ref=e50] [cursor=pointer]:
