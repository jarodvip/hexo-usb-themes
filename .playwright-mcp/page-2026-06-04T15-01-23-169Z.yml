                - text: "#"
              - text: 2.4 安装自己需要的 PHP 版本
            - paragraph [ref=e88]: 这个源目前默认的 PHP 是 8.5.x，如果您需要其他版本，那么请修改对应的 PHP 版本号 (注意配置文件哦)。
            - paragraph [ref=e89]: 这里举例 WordPress 需要的部分 PHP 包
            - paragraph [ref=e90]: "安装 PHP 8.5.x (从 PHP 8.5 开始 OPcache 已经强制集成，不需要单独安装):"
            - generic [ref=e91]:
              - code [ref=e93]: "apt install php8.5-{fpm,cli,mysql,curl,gd,mbstring,xml,zip,imap,soap,gmp,bcmath} -y"
              - button "Copy" [ref=e95] [cursor=pointer]
            - paragraph [ref=e96]: 安装 PHP 8.4.x：
            - generic [ref=e97]:
              - code [ref=e99]: "apt install php8.4-{fpm,cli,mysql,curl,gd,mbstring,xml,zip,imap,opcache,soap,gmp,bcmath} -y"
              - button "Copy" [ref=e101] [cursor=pointer]
            - paragraph [ref=e102]: 安装 PHP 8.3.x：
            - generic [ref=e103]:
              - code [ref=e105]: "apt install php8.3-{fpm,cli,mysql,curl,gd,mbstring,xml,zip,imap,opcache,soap,gmp,bcmath} -y"
              - button "Copy" [ref=e107] [cursor=pointer]
            - paragraph [ref=e108]: 安装 PHP 8.2.x：
            - generic [ref=e109]:
              - code [ref=e111]: apt install php8.2-fpm php8.2-cli php8.2-mysql php8.2-curl php8.2-gd php8.2-mbstring php8.2-xml php8.2-zip php8.2-imap php8.2-opcache php8.2-soap php8.2-gmp php8.2-bcmath -y
              - button "Copy" [ref=e113] [cursor=pointer]
            - paragraph [ref=e114]:
              - strong [ref=e115]: 以下版本 PHP 已经 EOL，PHP 官方不再提供支持，请尽快更新您的程序兼容最新的 PHP，如果您的程序还未兼容，建议鞭策开发者
            - paragraph [ref=e116]: 安装 PHP 8.1.x
            - generic [ref=e117]:
              - code [ref=e119]: apt install php8.1-fpm php8.1-cli php8.1-mysql php8.1-curl php8.1-gd php8.1-mbstring php8.1-xml php8.1-zip php8.1-imap php8.1-opcache php8.1-soap php8.1-gmp php8.1-bcmath -y
              - button "Copy" [ref=e121] [cursor=pointer]
            - paragraph [ref=e122]: 安装 PHP 8.0.x
            - generic [ref=e123]:
              - code [ref=e125]: apt install php8.0-fpm php8.0-cli php8.0-mysql php8.0-curl php8.0-gd php8.0-mbstring php8.0-xml php8.0-zip php8.0-imap php8.0-opcache php8.0-soap php8.0-gmp php8.0-bcmath -y
              - button "Copy" [ref=e127] [cursor=pointer]
            - paragraph [ref=e128]: 安装 PHP 7.4.x
            - generic [ref=e129]:
              - code [ref=e131]: apt install php7.4-fpm php7.4-cli php7.4-mysql php7.4-curl php7.4-gd php7.4-mbstring php7.4-xml php7.4-xmlrpc php7.4-zip php7.4-json php7.4-imap php7.4-opcache php7.4-soap php7.4-gmp php7.4-bcmath -y
              - button "Copy" [ref=e133] [cursor=pointer]
            - paragraph [ref=e134]: 安装 PHP 7.3.x
            - generic [ref=e135]:
              - code [ref=e137]: apt install php7.3-fpm php7.3-mysql php7.3-curl php7.3-gd php7.3-mbstring php7.3-xml php7.3-xmlrpc php7.3-zip php7.3-opcache
              - button "Copy" [ref=e139] [cursor=pointer]
            - paragraph [ref=e140]: 安装 PHP 7.2.x (PHP 7.2 开始已经不支持 mcrypt 组件)
            - generic [ref=e141]:
              - code [ref=e143]: apt install php7.2-fpm php7.2-mysql php7.2-curl php7.2-gd php7.2-mbstring php7.2-xml php7.2-xmlrpc php7.2-zip php7.2-opcache
              - button "Copy" [ref=e145] [cursor=pointer]
            - paragraph [ref=e146]: 安装 PHP 7.1.x
            - generic [ref=e147]:
              - code [ref=e149]: apt install php7.1-fpm php7.1-mysql php7.1-curl php7.1-gd php7.1-mbstring php7.1-mcrypt php7.1-xml php7.1-xmlrpc php7.1-zip php7.1-opcache
              - button "Copy" [ref=e151] [cursor=pointer]
            - paragraph [ref=e152]: 安装 PHP 7.0.x
            - generic [ref=e153]:
              - code [ref=e155]: apt install php7.0-fpm php7.0-mysql php7.0-curl php7.0-gd php7.0-mbstring php7.0-mcrypt php7.0-xml php7.0-xmlrpc php7.0-zip php7.0-opcache
              - button "Copy" [ref=e157] [cursor=pointer]
            - paragraph [ref=e158]: 安装 PHP 5.6.x
            - generic [ref=e159]:
              - code [ref=e161]: apt install php5.6-fpm php5.6-mysql php5.6-curl php5.6-gd php5.6-mbstring php5.6-mcrypt php5.6-xml php5.6-xmlrpc php5.6-zip php5.6-opcache
              - button "Copy" [ref=e163] [cursor=pointer]
            - paragraph [ref=e164]: 如果希望安装其他组件，可以通过搜索看看有没有对应的包
            - generic [ref=e165]:
              - code [ref=e167]: apt-cache search php8.5* | grep php8.5
              - button "Copy" [ref=e169] [cursor=pointer]
            - paragraph [ref=e170]:
              - text: 修改
              - code [ref=e171]: php.ini
              - text: 防止跨目录攻击，如果安装的 PHP 8.5.x 请相应修改
              - code [ref=e172]: /etc/php/8.5/fpm/php.ini
              - text: PHP 7.4.x 请相应修改
              - code [ref=e173]: /etc/php/7.4/fpm/php.ini
            - generic [ref=e174]:
              - code [ref=e176]: sed -i 's/;cgi.fix_pathinfo=1/cgi.fix_pathinfo=0/' /etc/php/8.5/fpm/php.ini
              - button "Copy" [ref=e178] [cursor=pointer]
            - paragraph [ref=e179]:
              - text: 修改
              - code [ref=e180]: php.ini
              - text: 增加上传大小限制
            - generic [ref=e181]:
              - code [ref=e183]: sed -i 's/upload_max_filesize = 2M/upload_max_filesize = 10M/' /etc/php/8.5/fpm/php.ini sed -i 's/post_max_size = 8M/post_max_size = 10M/' /etc/php/8.5/fpm/php.ini
              - button "Copy" [ref=e185] [cursor=pointer]
            - paragraph [ref=e186]: 您也可以同时安装多个 PHP 版本，然后使用以下命令选择系统默认的 PHP 版本：
            - generic [ref=e187]:
              - code [ref=e189]: update-alternatives --config php
              - button "Copy" [ref=e191] [cursor=pointer]
            - heading "Permalink3、增加 Ondřej Surý 大神打包的 Apache 2 源并安装" [level=2] [ref=e192]:
              - link "Permalink" [ref=e193] [cursor=pointer]:
                - /url: "#3-zeng-jia-ondrej-sury-da-shen-da-bao-de-apache-2-yuan-bing-an-zhuang"
                - text: "#"
              - text: 3、增加 Ondřej Surý 大神打包的 Apache 2 源并安装
            - paragraph [ref=e194]:
              - text: 这里我们推荐
              - link "Ondřej Surý" [ref=e195] [cursor=pointer]:
                - /url: https://deb.sury.org/
              - text: 打包的 Apache 2 源。
            - heading "Permalink3.1 Debian 和 Ubuntu 安装 LAMP 区别" [level=3] [ref=e196]:
              - link "Permalink" [ref=e197] [cursor=pointer]:
                - /url: "#3-1-debian-he-ubuntu-an-zhuang-lamp-qu-bie"
                - text: "#"
              - text: 3.1 Debian 和 Ubuntu 安装 LAMP 区别
            - paragraph [ref=e198]: 唯一区别就是 Apache 2 和 PHP 的安装添加源方法不一样，其他的步骤都一毛一样。
            - heading "Permalink3.2 首先增加 Apache 源" [level=3] [ref=e199]:
              - link "Permalink" [ref=e200] [cursor=pointer]:
                - /url: "#3-2-shou-xian-zeng-jia-apache-yuan"
                - text: "#"
              - text: 3.2 首先增加 Apache 源
            - generic [ref=e201]:
              - generic [ref=e202]:
                - button "Debian" [ref=e203] [cursor=pointer]
                - button "Ubuntu" [ref=e204] [cursor=pointer]
              - generic [ref=e207]:
                - code [ref=e209]:
                  - text: wget -O /usr/share/keyrings/apache2.gpg https://packages.sury.org/apache2/apt.gpg echo
                  - generic [ref=e210]: "\"deb [signed-by=/usr/share/keyrings/apache2.gpg] https://packages.sury.org/apache2/ $(lsb_release -sc) main\""
                  - text: "> /etc/apt/sources.list.d/apache2.list"
                - button "Copy" [ref=e212] [cursor=pointer]
            - paragraph [ref=e213]:
              - text: Debian 下也可以直接使用
              - link "extrepo" [ref=e214] [cursor=pointer]:
                - /url: /debian-extrepo/
              - text: ":"
            - generic [ref=e215]:
              - code [ref=e217]: sudo extrepo enable sury_apache2
              - button "Copy" [ref=e219] [cursor=pointer]
            - heading "Permalink3.3 接着更新并安装 Apache 2.4" [level=3] [ref=e220]:
              - link "Permalink" [ref=e221] [cursor=pointer]:
                - /url: "#3-3-jie-zhao-geng-xin-bing-an-zhuang-apache-2-4"
                - text: "#"
              - text: 3.3 接着更新并安装 Apache 2.4
            - generic [ref=e222]:
              - code [ref=e224]: apt update apt upgrade -y apt install apache2 -y
              - button "Copy" [ref=e226] [cursor=pointer]
            - paragraph [ref=e227]:
              - text: 安装完毕后，我们可以使用
              - code [ref=e228]: apachectl -v
              - text: 命令看到 Apache 2 已经是最新的 2.4 版本了
            - generic [ref=e229]:
              - code [ref=e231]: "root@debian ~ # apachectl -v Server version: Apache/2.4.66 (Debian) Server built: 2025-12-05T14:35:42"
              - button "Copy" [ref=e233] [cursor=pointer]
            - heading "Permalink3.4 Apache 2 开启 PHP-FPM 支持" [level=3] [ref=e234]:
              - link "Permalink" [ref=e235] [cursor=pointer]:
                - /url: "#3-4-apache-2-kai-qi-php-fpm-zhi-chi"
                - text: "#"
              - text: 3.4 Apache 2 开启 PHP-FPM 支持
            - paragraph [ref=e236]: 首先，需要开启 Apache 2 的 PHP-FPM 支持，我们以 PHP 8.5 为例，按照自己的需求，可以开启如下模块
            - generic [ref=e237]:
              - code [ref=e239]: a2enconf php8.5-fpm a2enmod proxy_fcgi a2enmod headers a2enmod http2 a2enmod remoteip a2enmod ssl a2enmod rewrite a2enmod expires a2enmod deflate a2enmod mime a2enmod setenvif
              - button "Copy" [ref=e241] [cursor=pointer]
            - paragraph [ref=e242]: 然后我们重启 PHP-FPM 服务
            - generic [ref=e243]:
              - code [ref=e245]: systemctl restart php8.5-fpm
              - button "Copy" [ref=e247] [cursor=pointer]
            - paragraph [ref=e248]: 对应 PHP 7.4.x 命令如下
            - generic [ref=e249]:
              - code [ref=e251]: systemctl restart php7.4-fpm
              - button "Copy" [ref=e253] [cursor=pointer]
            - paragraph [ref=e254]:
              - text: Apache 2 参考配置文件如下，因为默认 Debian 的 Apache 2 默认配置已经使用了
              - code [ref=e255]: example.com
              - text: 这个域名，所以我们以
              - code [ref=e256]: example.org
              - text: 为例，新建立个
              - code [ref=e257]: /etc/apache2/sites-available/example.org.conf
            - generic [ref=e258]:
              - code [ref=e260]: "cat >> /etc/apache2/sites-available/example.org.conf << EOF <VirtualHost *:80> ServerName example.org DocumentRoot /var/www/example.org DirectoryIndex index.php index.html index.htm ErrorLog ${APACHE_LOG_DIR}/example.org.error.log CustomLog ${APACHE_LOG_DIR}/example.org.access.log combined <Directory /var/www/example.org> Options FollowSymLinks AllowOverride All Require all granted </Directory> </VirtualHost> EOF"
              - button "Copy" [ref=e262] [cursor=pointer]
            - paragraph [ref=e263]:
              - text: 然后使用
              - code [ref=e264]: a2ensite
              - text: 命令使其生效
            - generic [ref=e265]:
              - code [ref=e267]: a2ensite example.org.conf
              - button "Copy" [ref=e269] [cursor=pointer]
            - paragraph [ref=e270]:
              - emphasis [ref=e271]:
                - text: 如果不需要这个 vhost 的时候可以使用
                - code [ref=e272]: a2dissite example.org.conf
                - text: 命令移除
            - paragraph [ref=e273]:
              - text: 检测是否已经软链接到
              - code [ref=e274]: /etc/apache2/sites-enabled
              - text: 目录
            - generic [ref=e275]:
              - code [ref=e277]: "root@debian ~ # ls /etc/apache2/sites-enabled 000-default.conf example.org.conf"
              - button "Copy" [ref=e279] [cursor=pointer]
            - paragraph [ref=e280]:
              - text: 到这里基本没有问题，我们可以执行
              - code [ref=e281]: apache2ctl configtest
              - text: 命令检查配置文件是否出错
            - generic [ref=e282]:
              - code [ref=e284]: "root@debian ~ # apache2ctl configtest Syntax OK"
              - button "Copy" [ref=e286] [cursor=pointer]
            - paragraph [ref=e287]:
              - text: 显示
              - code [ref=e288]: Syntax OK
              - text: 则说明所有配置文件均无问题，可以重启 Apache 2 使我们的配置生效
            - generic [ref=e289]:
              - code [ref=e291]: systemctl restart apache2
              - button "Copy" [ref=e293] [cursor=pointer]
            - paragraph [ref=e294]:
              - text: 我们的目录在
              - code [ref=e295]: /var/www/example.org
              - text: ，我们先创建这个目录
            - generic [ref=e296]:
              - code [ref=e298]: mkdir -p /var/www/example.org
              - button "Copy" [ref=e300] [cursor=pointer]
            - paragraph [ref=e301]:
              - text: 然后创建一个
              - code [ref=e302]: phpinfo.php
              - text: 并输入
              - code [ref=e303]: phpinfo()
              - text: 函数
            - generic [ref=e304]:
              - code [ref=e306]: cat >> /var/www/example.org/phpinfo.php << EOF <?php phpinfo(); ?> EOF
              - button "Copy" [ref=e308] [cursor=pointer]
            - paragraph [ref=e309]:
              - text: 好了，此时在浏览器输入
              - code [ref=e310]: http://example.org/phpinfo.php
              - text: ，如果看到经典的
              - code [ref=e311]: phpinfo
              - text: 页面则说明安装成功，如果不成功，请仔细对比步骤查找哪里出错或在烧饼博客下方留言。
            - paragraph [ref=e312]: 最终效果如下：
            - paragraph:
              - img "image.png"
            - heading "Permalink4、安装 MariaDB" [level=2] [ref=e313]:
              - link "Permalink" [ref=e314] [cursor=pointer]:
                - /url: "#4-an-zhuang-mariadb"
                - text: "#"
              - text: 4、安装 MariaDB
            - paragraph [ref=e315]: 这里我们使用 MariaDB 作为 MySQL 的代替
            - heading "Permalink4.1 首先，添加并导入 Mariadb 的官方源" [level=3] [ref=e316]:
              - link "Permalink" [ref=e317] [cursor=pointer]:
                - /url: "#4-1-shou-xian-tian-jia-bing-dao-ru-mariadb-de-guan-fang-yuan"
                - text: "#"
              - text: 4.1 首先，添加并导入 Mariadb 的官方源
            - paragraph [ref=e318]:
              - text: 按照官方的
              - link "教程" [ref=e319] [cursor=pointer]:
                - /url: https://mariadb.com/kb/en/gpg/
              - text: 导入 GPG
            - paragraph [ref=e320]: 下载 GPG Key：
