              - text: 1、更新系统并安装部分必要软件
            - generic [ref=e40]:
              - code [ref=e42]: apt update apt upgrade -y apt dist-upgrade -y apt install curl vim wget gnupg dpkg apt-transport-https lsb-release ca-certificates
              - button "Copy" [ref=e44] [cursor=pointer]
            - paragraph [ref=e45]:
