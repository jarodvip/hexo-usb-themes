                - button "Debian" [ref=e62] [cursor=pointer]
                - button "Ubuntu" [ref=e63] [cursor=pointer]
              - generic [ref=e66]:
                - code [ref=e68]:
                  - text: wget -O /usr/share/keyrings/php.gpg https://packages.sury.org/php/apt.gpg echo
                  - generic [ref=e69]: "\"deb [signed-by=/usr/share/keyrings/php.gpg] https://packages.sury.org/php/ $(lsb_release -sc) main\""
                  - text: "> /etc/apt/sources.list.d/php.list"
                - button "Copy" [ref=e71] [cursor=pointer]
            - paragraph [ref=e72]:
              - text: Debian 下也可以直接使用
              - link "extrepo" [ref=e73] [cursor=pointer]:
                - /url: /debian-extrepo/
              - text: ":"
