                - text: "#"
              - text: 2、增加 Ondřej Surý 大神打包的 PHP 源并安装 PHP 8.x
            - paragraph [ref=e51]:
              - text: 和
              - link "LEMP" [ref=e52] [cursor=pointer]:
                - /url: /debian-install-nginx-php-mysql/
              - text: 安装方法一样，我们还是使用
              - link "Ondřej Surý" [ref=e53] [cursor=pointer]:
                - /url: https://deb.sury.org/
              - text: 大佬打包的 PHP 源。
            - paragraph [ref=e54]: 至于为啥先装 PHP 再装 Apache 2，因为装了 PHP 以后 Apache 2 会识别你 PHP 版本然后生成对应的配置文件，所以顺序不要搞反。
            - heading "Permalink2.1 Debian 和 Ubuntu 安装 LAMP 区别" [level=3] [ref=e55]:
              - link "Permalink" [ref=e56] [cursor=pointer]:
                - /url: "#2-1-debian-he-ubuntu-an-zhuang-lamp-qu-bie"
                - text: "#"
              - text: 2.1 Debian 和 Ubuntu 安装 LAMP 区别
            - paragraph [ref=e57]: 唯一区别就是 PHP 和 Apache 2 的安装添加源方法不一样，其他的步骤都一毛一样。
            - heading "Permalink2.2 加入大神做好的源" [level=3] [ref=e58]:
