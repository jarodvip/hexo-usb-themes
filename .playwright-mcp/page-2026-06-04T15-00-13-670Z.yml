  - main [ref=e22]:
    - generic [ref=e23]:
      - article [ref=e25]:
        - heading "Debian / Ubuntu 下使用 nginx-acme 自动签发并配置 SSL 证书" [level=1] [ref=e27]
        - generic [ref=e28]:
          - figure [ref=e29]:
            - img "Debian / Ubuntu 下使用 nginx-acme 自动签发并配置 SSL 证书" [ref=e30]
          - generic [ref=e31]:
            - paragraph [ref=e32]: 本文将介绍在 Debian 或 Ubuntu 下使用 nginx-acme 自动签发并配置 SSL 证书的方法。
            - paragraph [ref=e33]: 本文适合 Debian Stable 和 Ubuntu LTS，请使用 root 用户进行操作。
            - heading "Permalink1、什么是 nginx-acme" [level=2] [ref=e34]:
              - link "Permalink" [ref=e35] [cursor=pointer]:
                - /url: "#1-shi-me-shi-nginx-acme"
                - text: "#"
              - text: 1、什么是 nginx-acme
            - paragraph [ref=e36]:
              - link "nginx-acme" [ref=e37] [cursor=pointer]:
                - /url: https://github.com/nginx/nginx-acme
              - text: 是 Nginx 官方开发的基于 ACME 协议自动签发 SSL 证书的模块，隔壁 Caddy 都出了几百年的功能， Nginx 也终于赶上了。
            - paragraph [ref=e38]: 和 Nginx 使用 C 语言开发不同，这个模块是用 Rust 语言开发的，这里就不做评价。
            - paragraph [ref=e39]:
              - text: 这个模块支持
              - link "RFC8555" [ref=e40] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/rfc8555
              - text: 、
              - link "RFC8737" [ref=e41] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/rfc8737
              - text: 、
              - link "RFC8738" [ref=e42] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/html/rfc8738
              - text: 和
              - link "draft-ietf-acme-profiles" [ref=e43] [cursor=pointer]:
                - /url: https://datatracker.ietf.org/doc/draft-ietf-acme-profiles/
              - text: 等规范，目前我实际测试下来已经基本可以用于生产环境。
            - heading "Permalink2、安装 N.WTF" [level=2] [ref=e44]:
              - link "Permalink" [ref=e45] [cursor=pointer]:
                - /url: "#2-an-zhuang-n-wtf"
                - text: "#"
              - text: 2、安装 N.WTF
            - paragraph [ref=e46]:
              - text: 这里我们使用
              - link "烧饼博客" [ref=e47] [cursor=pointer]:
                - /url: https://u.sb/
              - text: 打包的
              - link "N.WTF" [ref=e48] [cursor=pointer]:
                - /url: https://n.wtf/
              - text: ，这个项目已经集成了
              - code [ref=e49]: nginx-acme
              - text: 模块，可以做到开箱即用。
            - paragraph [ref=e50]: 首先，安装一些必要的软件包：
            - generic [ref=e51]:
              - code [ref=e53]: sudo apt update sudo apt upgrade -y sudo apt install curl vim wget gnupg dpkg apt-transport-https lsb-release ca-certificates
              - button "Copy" [ref=e55] [cursor=pointer]
            - paragraph [ref=e56]: 然后加入 N.WTF 的 GPG 公钥和 apt 源：
            - generic [ref=e57]:
              - code [ref=e59]: curl -sSL https://n.wtf/public.key | sudo bash -c 'gpg --dearmor > /usr/share/keyrings/n.wtf.gpg' sudo bash -c 'echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/n.wtf.gpg] https://mirror-cdn.xtom.com/sb/nginx/ $(lsb_release -sc) main" > /etc/apt/sources.list.d/n.wtf.list'
              - button "Copy" [ref=e61] [cursor=pointer]
            - paragraph [ref=e62]:
              - text: 国内机器可以用
              - link "清华 TUNA" [ref=e63] [cursor=pointer]:
                - /url: https://mirrors.tuna.tsinghua.edu.cn/
              - text: 的国内源：
            - generic [ref=e64]:
              - code [ref=e66]: curl -sSL https://mirrors.tuna.tsinghua.edu.cn/n.wtf/public.key | sudo bash -c 'gpg --dearmor > /usr/share/keyrings/n.wtf.gpg' sudo bash -c 'echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/n.wtf.gpg] https://mirrors.tuna.tsinghua.edu.cn/n.wtf/ $(lsb_release -sc) main" > /etc/apt/sources.list.d/n.wtf.list'
              - button "Copy" [ref=e68] [cursor=pointer]
            - paragraph [ref=e69]:
              - text: Debian 下也可以直接使用
              - link "extrepo" [ref=e70] [cursor=pointer]:
                - /url: /debian-extrepo/
              - text: ":"
            - generic [ref=e71]:
              - code [ref=e73]: sudo apt update sudo apt install extrepo -y sudo extrepo enable n.wtf
              - button "Copy" [ref=e75] [cursor=pointer]
            - paragraph [ref=e76]: 接着更新系统并安装 Nginx：
            - generic [ref=e77]:
              - code [ref=e79]: sudo apt update sudo apt install nginx-extras -y
              - button "Copy" [ref=e81] [cursor=pointer]
            - heading "Permalink3、nginx-acme 准备工作" [level=2] [ref=e82]:
              - link "Permalink" [ref=e83] [cursor=pointer]:
                - /url: "#3-nginx-acme-zhun-bei-gong-zuo"
                - text: "#"
              - text: 3、nginx-acme 准备工作
            - paragraph [ref=e84]:
              - text: 准备工作很简单，我们需要建立一个目录来存放 SSL 证书并给予正确的权限，这里我们以
              - code [ref=e85]: /var/cache/nginx/letsencrypt
              - text: 为演示：
            - generic [ref=e86]:
              - code [ref=e88]: sudo mkdir -p /var/cache/nginx sudo mkdir -p /var/cache/nginx/letsencrypt sudo chown 33:33 /var/cache/nginx -R
              - button "Copy" [ref=e90] [cursor=pointer]
            - paragraph [ref=e91]: 然后别忘了把域名解析到你的服务器哦！
            - heading "Permalink4、配置 Nginx 站点" [level=2] [ref=e92]:
              - link "Permalink" [ref=e93] [cursor=pointer]:
                - /url: "#4-pei-zhi-nginx-zhan-dian"
                - text: "#"
              - text: 4、配置 Nginx 站点
            - paragraph [ref=e94]:
              - text: 我们以
              - code [ref=e95]: example.com
              - text: 为例，假设你的邮箱是
              - code [ref=e96]: user@example.com
              - text: ，需要配置的域名是
              - code [ref=e97]: example.com
              - text: 和
              - code [ref=e98]: www.example.com
              - text: ，并且希望访问
              - code [ref=e99]: www.example.com
              - text: 跳转到
              - code [ref=e100]: example.com
              - text: ：
            - paragraph [ref=e101]:
              - text: 直接修改
              - code [ref=e102]: /etc/nginx/sites-enabled/default
              - text: 文件：
            - generic [ref=e103]:
              - code [ref=e105]: "resolver 8.8.8.8:53 ipv6=off valid=5s; acme_issuer letsencrypt { uri https://acme-v02.api.letsencrypt.org/directory; contact user@example.com; state_path /var/cache/nginx/letsencrypt; accept_terms_of_service; ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt; ssl_verify off; } acme_shared_zone zone=ngx_acme_shared:1M; server { # Listen on port 80 for all IPv4 and IPv6 addresses listen 80 default_server; listen [::]:80 default_server; # Match all domain names server_name _; location /.well-known/ { return 404; } location / { # Redirect all other HTTP requests to HTTPS using 301 permanent redirect return 301 https://$host$request_uri; } } server { # Standard TLS listening listen 443 ssl default_server; listen [::]:443 ssl default_server; # HTTP/2 protocol support http2 on; # HTTP/3 QUIC protocol support listen 443 quic reuseport; listen [::]:443 quic reuseport; add_header Alt-Svc 'h3=\":443\"; ma=86400' always; add_header X-Protocol $server_protocol always; server_name example.com; root /var/www/html; index index.html; # modern configuration ssl_protocols TLSv1.3; ssl_ecdh_curve X25519:prime256v1:secp384r1; ssl_prefer_server_ciphers off; acme_certificate letsencrypt; ssl_certificate $acme_certificate; ssl_certificate_key $acme_certificate_key; # do not parse the certificate on each request ssl_certificate_cache max=2; } server { listen 443 ssl; listen [::]:443 ssl; http2 on; listen 443 quic; listen [::]:443 quic; add_header Alt-Svc 'h3=\":443\"; ma=86400' always; add_header X-Protocol $server_protocol always; server_name www.example.com; return 301 https://example.com$request_uri; ssl_protocols TLSv1.3; ssl_ecdh_curve X25519:prime256v1:secp384r1; ssl_prefer_server_ciphers off; acme_certificate letsencrypt; ssl_certificate $acme_certificate; ssl_certificate_key $acme_certificate_key; # do not parse the certificate on each request ssl_certificate_cache max=2; }"
              - button "Copy" [ref=e107] [cursor=pointer]
            - paragraph [ref=e108]: 然后验证 Nginx 配置并重新加载：
            - generic [ref=e109]:
              - code [ref=e111]: sudo nginx -t sudo nginx -s reload
              - button "Copy" [ref=e113] [cursor=pointer]
            - paragraph [ref=e114]:
              - text: 此时，在默认的 Nginx 日志文件
              - code [ref=e115]: /var/log/nginx/access.log
              - text: 中可以看到 Let's Encrypt 验证服务器的请求记录：
            - generic [ref=e116]:
              - code [ref=e118]: 23.178.112.210 - - [15/Jan/2026:16:08:18 +0000] "GET /.well-known/acme-challenge/blablablablablablablablablablablablablablab HTTP/1.1" 200 87 "-" "Mozilla/5.0 (compatible; Let's Encrypt validation server; +https://www.letsencrypt.org)" 34.212.137.78 - - [15/Jan/2026:16:08:18 +0000] "GET /.well-known/acme-challenge/blablablablablablablablablablablablablablab HTTP/1.1" 200 87 "-" "Mozilla/5.0 (compatible; Let's Encrypt validation server; +https://www.letsencrypt.org)" 18.222.179.58 - - [15/Jan/2026:16:08:18 +0000] "GET /.well-known/acme-challenge/blablablablablablablablablablablablablablab HTTP/1.1" 200 87 "-" "Mozilla/5.0 (compatible; Let's Encrypt validation server; +https://www.letsencrypt.org)" 16.171.19.61 - - [15/Jan/2026:16:08:18 +0000] "GET /.well-known/acme-challenge/blablablablablablablablablablablablablablab HTTP/1.1" 200 87 "-" "Mozilla/5.0 (compatible; Let's Encrypt validation server; +https://www.letsencrypt.org)" 13.228.72.222 - - [15/Jan/2026:16:08:18 +0000] "GET /.well-known/acme-challenge/blablablablablablablablablablablablablablab HTTP/1.1" 200 87 "-" "Mozilla/5.0 (compatible; Let's Encrypt validation server; +https://www.letsencrypt.org)" 2600:3000:2710:200::81 - - [15/Jan/2026:16:08:20 +0000] "GET /.well-known/acme-challenge/blablablablablablablablablablablablablablab HTTP/1.1" 200 87 "-" "Mozilla/5.0 (compatible; Let's Encrypt validation server; +https://www.letsencrypt.org)" 2600:1f14:804:fd02:f7fd:3c68:dec7:a062 - - [15/Jan/2026:16:08:20 +0000] "GET /.well-known/acme-challenge/blablablablablablablablablablablablablablab HTTP/1.1" 200 87 "-" "Mozilla/5.0 (compatible; Let's Encrypt validation server; +https://www.letsencrypt.org)" 2600:1f16:269:da00:c9ce:508c:ea69:9c2 - - [15/Jan/2026:16:08:20 +0000] "GET /.well-known/acme-challenge/blablablablablablablablablablablablablablab HTTP/1.1" 200 87 "-" "Mozilla/5.0 (compatible; Let's Encrypt validation server; +https://www.letsencrypt.org)" 2a05:d016:39f:3101:8b83:62b8:2603:d15d - - [15/Jan/2026:16:08:20 +0000] "GET /.well-known/acme-challenge/blablablablablablablablablablablablablablab HTTP/1.1" 200 87 "-" "Mozilla/5.0 (compatible; Let's Encrypt validation server; +https://www.letsencrypt.org)" 2406:da18:85:1401:1f69:967a:a988:cdc8 - - [15/Jan/2026:16:08:20 +0000] "GET /.well-known/acme-challenge/blablablablablablablablablablablablablablab HTTP/1.1" 200 87 "-" "Mozilla/5.0 (compatible; Let's Encrypt validation server; +https://www.letsencrypt.org)"
              - button "Copy" [ref=e120] [cursor=pointer]
            - paragraph [ref=e121]:
              - text: 等待数秒后即可访问
              - code [ref=e122]: https://example.com/
              - text: 了。
            - paragraph [ref=e123]:
              - text: 如果要给 IP 地址签发证书，则需要在
              - code [ref=e124]: "acme_issuer letsencrypt {}"
              - text: 段里添加一行
              - code [ref=e125]: profile shortlived;
              - text: ，并且
              - code [ref=e126]: server_name
              - text: 必须写入完整的 IP 地址，不能直接用
              - code [ref=e127]: server_name _
              - text: 哦。
            - paragraph [ref=e128]:
              - deletion [ref=e129]: 不过目前 nginx-acme 最新版本 0.3.1 签发 IP 证书还是会失败，开发版已经修复，应该需要等下一个版本才能使用。
            - paragraph [ref=e130]:
              - text: 目前最新版本已经支持 IP 地址证书的签发，可以在
              - code [ref=e131]: accept_terms_of_service;
              - text: 下方加入一条
              - code [ref=e132]: profile shortlived;
              - text: 并且自行修改
              - code [ref=e133]: server_name example.com;
              - text: 为你的 IP 地址，比如
              - code [ref=e134]: server_name 192.0.2.2 2001:db8::2;
              - text: 即可。
            - paragraph [ref=e135]: 读者们在使用过程中如果遇到问题，可以在 V2EX 交流讨论：
            - paragraph [ref=e136]:
              - link "https://be.st/Mv7j" [ref=e137] [cursor=pointer]:
                - /url: https://be.st/Mv7j
